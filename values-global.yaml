---
global:
  pattern: multicloud-gitops
  options:
    useCSV: false
    syncPolicy: Automatic
    installPlanApproval: Automatic
main:
  clusterGroupName: hub
  # This way we can install the customer operator via ./hack/operator-build-script.sh
  # and then install this pattern via ./pattern.sh make install
  #patternsOperator:
  #  enableSubscription: false
  multiSourceConfig:
    enabled: true
    #helmRepoUrl: quay.io/validatedpatterns
    # clusterGroupChartVersion: "0.9.*"
    clusterGroupGitRepoUrl: https://github.com/mbaldessari/clustergroup-chart
    clusterGroupChartGitRevision: ourown-gitops
